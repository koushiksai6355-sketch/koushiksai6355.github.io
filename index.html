<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grandhe Sai Koushik | Full Stack Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: rgba(255,255,255,0.07);
    --accent: #7fff6e;
    --accent2: #5be8ff;
    --accent3: #ff6b6b;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --card: #14141e;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow-x: hidden;
    cursor: none;
  }

  .cursor {
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transition: all 0.12s ease;
    mix-blend-mode: difference;
    opacity: 0.5;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9000;
    opacity: 0.4;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s, background 0.3s;
  }
  nav.scrolled {
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-color: var(--border);
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    color: var(--accent);
    text-decoration: none;
  }
  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }

  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 120px 48px 80px;
    position: relative;
    overflow: hidden;
  }

  .hero-bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(127,255,110,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(127,255,110,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridShift 20s linear infinite;
  }
  @keyframes gridShift {
    from { transform: translateY(0); }
    to { transform: translateY(60px); }
  }

  .hero-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    animation: orbPulse 8s ease-in-out infinite alternate;
  }
  .orb1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(127,255,110,0.12) 0%, transparent 70%);
    top: -200px; right: -100px;
  }
  .orb2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(91,232,255,0.08) 0%, transparent 70%);
    bottom: -100px; left: 100px;
    animation-delay: -4s;
  }
  @keyframes orbPulse {
    from { transform: scale(1) rotate(0deg); opacity: 0.7; }
    to { transform: scale(1.15) rotate(5deg); opacity: 1; }
  }

  .hero-left { position: relative; z-index: 2; }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(127,255,110,0.08);
    border: 1px solid rgba(127,255,110,0.2);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 32px;
    animation: fadeUp 0.8s ease both;
  }
  .hero-tag::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .hero-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(3rem, 6vw, 5.5rem);
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
    animation: fadeUp 0.8s ease 0.1s both;
  }
  .hero-name span {
    display: block;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(127,255,110,0.5);
    font-style: italic;
    font-family: 'Instrument Serif', serif;
  }

  .hero-role {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 40px;
    animation: fadeUp 0.8s ease 0.2s both;
  }
  .hero-role strong { color: var(--accent2); }

  .hero-desc {
    font-size: 0.82rem;
    line-height: 1.9;
    color: var(--muted);
    max-width: 420px;
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease 0.3s both;
  }

  .hero-btns {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    animation: fadeUp 0.8s ease 0.4s both;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0f;
    padding: 14px 32px;
    border-radius: 4px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-decoration: none;
    text-transform: uppercase;
    transition: transform 0.2s, box-shadow 0.2s;
    display: inline-block;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(127,255,110,0.3);
  }

  .btn-ghost {
    padding: 14px 32px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-decoration: none;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s, transform 0.2s;
    display: inline-block;
  }
  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }

  .hero-right {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 16px;
    animation: fadeUp 0.
